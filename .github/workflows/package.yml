name: Validate and package

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate extension
        run: |
          node scripts/validate.mjs
          find extension scripts -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | xargs -0 -n1 node --check
          python3 -m json.tool extension/manifest.json >/dev/null

      - name: Create side-loadable ZIP
        run: |
          mkdir -p dist
          cd extension
          zip -r ../dist/speed-dial-2.zip .

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: speed-dial-2
          path: dist/speed-dial-2.zip
          if-no-files-found: error

      - name: Attach package to tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/speed-dial-2.zip --generate-notes
