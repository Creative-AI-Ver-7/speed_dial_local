name: Validate, package and release

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate extension
        run: |
          node scripts/validate.mjs
          find extension scripts -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | xargs -0 -n1 node --check
          python3 -m json.tool extension/manifest.json >/dev/null

      - name: Determine package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./extension/manifest.json').version")"
          release=false

          if [[ "${GITHUB_REF}" == "refs/heads/master" && "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            current_tag="$(git tag --points-at "${GITHUB_SHA}" --list 'v[0-9]*' --sort=-v:refname | head -n 1)"
            if [[ -n "${current_tag}" ]]; then
              version="${current_tag#v}"
            else
              latest_tag="$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n 1)"
              if [[ -z "${latest_tag}" ]]; then
                version="0.1.0"
              else
                IFS='.' read -r major minor patch <<< "${latest_tag#v}"
                patch="${patch:-0}"
                version="${major}.${minor}.$((10#${patch} + 1))"
              fi
            fi
            release=true

            node -e "const fs=require('fs');const p='extension/manifest.json';const m=JSON.parse(fs.readFileSync(p));m.version=process.argv[1];fs.writeFileSync(p, JSON.stringify(m,null,2)+'\\n')" "${version}"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
          echo "release=${release}" >> "${GITHUB_OUTPUT}"

      - name: Create side-loadable ZIP
        run: |
          mkdir -p dist
          cd extension
          zip -r "../dist/zero-dial-${{ steps.version.outputs.version }}.zip" .

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: zero-dial-${{ steps.version.outputs.version }}
          path: dist/zero-dial-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: steps.version.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          package="dist/zero-dial-${VERSION}.zip"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${package}" --clobber
          else
            gh release create "${TAG}" "${package}" \
              --target "${GITHUB_SHA}" \
              --title "Zero Dial ${TAG}" \
              --generate-notes
          fi
